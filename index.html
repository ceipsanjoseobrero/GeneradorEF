<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Core palette */
  --bg:#f0f2f9;
  --s1:#ffffff;
  --s2:#f5f6fc;
  --s3:#eceef8;
  --s4:#e2e5f5;

  /* Brand */
  --a1:#4f46e5;
  --a2:#6366f1;
  --a3:#818cf8;
  --a4:#eef0fd;
  --a-glow:rgba(79,70,229,0.18);

  /* Semantics */
  --emerald:#059669;
  --emerald-light:#ecfdf5;
  --orange:#ea580c;
  --orange-light:#fff7ed;
  --rose:#e11d48;
  --rose-light:#fff1f2;
  --amber:#d97706;
  --amber-light:#fffbeb;
  --cyan:#0891b2;
  --cyan-light:#ecfeff;
  --violet:#7c3aed;
  --pink:#db2777;

  /* Gradients */
  --grad:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);
  --grad2:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);
  --grad-warm:linear-gradient(135deg,#f97316 0%,#fbbf24 100%);
  --grad-green:linear-gradient(135deg,#059669 0%,#0891b2 100%);
  --grad-pink:linear-gradient(135deg,#e11d48 0%,#db2777 100%);
  --grad-hero:linear-gradient(135deg,#312e81 0%,#4f46e5 40%,#7c3aed 100%);

  /* Text */
  --tx:#0f0f1a;
  --tx2:#383851;
  --tx3:#7e7e9a;
  --tx4:#b8b8cc;

  /* Borders */
  --border:rgba(0,0,0,0.07);
  --border-focus:rgba(79,70,229,0.5);

  /* Shadows */
  --sh:0 1px 2px rgba(0,0,0,0.04),0 4px 14px rgba(0,0,0,0.05);
  --sh-md:0 4px 20px rgba(0,0,0,0.07),0 1px 3px rgba(0,0,0,0.04);
  --sh-lg:0 16px 48px rgba(0,0,0,0.10),0 4px 16px rgba(0,0,0,0.06);
  --sh-inner:inset 0 1px 2px rgba(0,0,0,0.04);
  --sh-glow:0 4px 24px rgba(79,70,229,0.25);

  /* Radii */
  --r:18px;--rsm:12px;--rxs:9px;

  /* Typography */
  --font-head:'Outfit',system-ui,sans-serif;
  --font-body:'DM Sans',system-ui,sans-serif;

  /* Layout */
  --nav-w:228px;
  --topbar-h:52px;
}

html{font-size:14px;scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--tx);
  font-family:var(--font-body);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
h1,h2,h3,h4,h5{font-family:var(--font-head)}

/* ── Inputs ── */
select,input,textarea{
  background:var(--s1);
  border:1.5px solid var(--border);
  border-radius:var(--rxs);
  padding:9px 13px;
  color:var(--tx);
  font-size:13px;
  width:100%;
  box-sizing:border-box;
  outline:none;
  font-family:var(--font-body);
  transition:border-color .18s,box-shadow .18s,background .18s;
  box-shadow:var(--sh-inner);
}
select:focus,input:focus,textarea:focus{
  border-color:var(--a1);
  box-shadow:0 0 0 3.5px var(--a-glow);
  background:#fff;
}
select:hover,input:hover,textarea:hover{border-color:var(--a3)}
input[type="color"]{padding:2px;cursor:pointer;height:36px;border-radius:8px;}
input[type="date"],input[type="number"]{color-scheme:light}

/* ── Buttons ── */
button{cursor:pointer;font-family:var(--font-body);transition:all .16s cubic-bezier(.4,0,.2,1);font-weight:600;}
button:active{transform:scale(.96)!important}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--a3)}

/* ── Shell ── */
#ef-shell{display:flex;min-height:100vh}

/* ── Sidebar ── */
#ef-sidebar{
  width:var(--nav-w);
  background:#fff;
  border-right:1px solid var(--border);
  position:fixed;left:0;top:0;bottom:0;
  display:flex;flex-direction:column;
  z-index:100;
  overflow-y:auto;overflow-x:hidden;
  box-shadow:0 0 0 1px var(--border),4px 0 24px rgba(0,0,0,0.04);
}
#ef-sidebar::-webkit-scrollbar{width:3px}

/* ── Main area ── */
#ef-main{margin-left:var(--nav-w);flex:1;min-height:100vh;display:flex;flex-direction:column;}

/* ── Topbar ── */
#ef-topbar{
  position:sticky;top:0;z-index:50;
  height:var(--topbar-h);
  display:flex;align-items:center;
  padding:0 1.75rem;gap:12px;
  background:rgba(240,242,249,0.88);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,0.7);
  box-shadow:0 1px 0 var(--border);
}

/* ── Content ── */
#ef-content{flex:1;padding:1.5rem 1.75rem;max-width:1120px;width:100%;margin:0 auto;}

/* ── Sidebar nav ── */
.sn-logo{
  padding:20px 16px 14px;
  cursor:pointer;
  border-bottom:1px solid var(--border);
  margin-bottom:6px;
}
.sn-group{
  padding:10px 18px 3px;
  font-family:var(--font-head);
  font-size:9.5px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--tx4);
  margin-top:4px;
}
.sn-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;
  margin:1px 8px;
  border-radius:11px;
  cursor:pointer;
  font-size:13px;font-weight:500;
  color:var(--tx2);
  transition:all .14s ease;
  border:none;background:transparent;
  width:calc(100% - 16px);
  text-align:left;
  font-family:var(--font-body);
  position:relative;
}
.sn-item:hover{background:var(--s2);color:var(--tx)}
.sn-item.active{
  background:linear-gradient(135deg,rgba(79,70,229,0.1),rgba(124,58,237,0.08));
  color:var(--a1);
  font-weight:700;
}
.sn-item.active::before{
  content:"";
  position:absolute;left:-8px;top:50%;transform:translateY(-50%);
  width:3px;height:18px;border-radius:0 3px 3px 0;
  background:var(--a1);
}
.sn-icon{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
  transition:all .14s;
  background:var(--s2);
}
.sn-item.active .sn-icon{
  background:var(--grad);
  box-shadow:0 2px 10px rgba(79,70,229,0.35);
}
.sn-item:hover:not(.active) .sn-icon{background:var(--s3);}

/* ── Overlay / Modal ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(8,8,20,0.52);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  z-index:999;
  animation:fadeIn .18s ease;
}
.overlay>div{animation:slideUp .22s cubic-bezier(.34,1.3,.64,1)}

/* ── Cards ── */
.ef-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);}
.ef-card-hover{transition:box-shadow .2s,transform .2s,border-color .2s;}
.ef-card-hover:hover{box-shadow:var(--sh-md);transform:translateY(-2px);border-color:var(--a3)}

/* ── Buttons ── */
.btn-primary{
  background:var(--grad);color:#fff;border:none;
  border-radius:var(--rsm);padding:10px 20px;
  font-weight:700;font-size:13px;cursor:pointer;
  box-shadow:var(--sh-glow);
  font-family:var(--font-body);
  letter-spacing:.1px;
}
.btn-primary:hover{box-shadow:0 8px 28px rgba(79,70,229,0.4);transform:translateY(-1px)}
.btn-secondary{
  background:var(--s2);color:var(--tx2);
  border:1.5px solid var(--border);
  border-radius:var(--rsm);padding:9px 18px;
  font-weight:600;font-size:13px;cursor:pointer;
  font-family:var(--font-body);
}
.btn-secondary:hover{background:var(--s3);color:var(--tx);border-color:var(--a3)}
.btn-danger{
  background:var(--rose-light);color:var(--rose);
  border:1.5px solid rgba(225,29,72,0.18);
  border-radius:10px;padding:7px 13px;
  font-weight:600;font-size:12px;cursor:pointer;
}
.btn-danger:hover{background:rgba(225,29,72,0.12)}
.btn-success{background:linear-gradient(135deg,#059669,#0891b2);color:#fff;border:none;border-radius:var(--rsm);padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 4px 18px rgba(5,150,105,0.3);font-family:var(--font-body);}
.btn-success:hover{box-shadow:0 8px 24px rgba(5,150,105,0.4);transform:translateY(-1px)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--font-head);letter-spacing:.2px}
.badge-purple{background:rgba(79,70,229,0.08);color:var(--a1);border:1px solid rgba(79,70,229,0.12)}
.badge-green{background:var(--emerald-light);color:var(--emerald);border:1px solid rgba(5,150,105,0.15)}
.badge-orange{background:var(--orange-light);color:var(--orange);border:1px solid rgba(234,88,12,0.15)}
.badge-pink{background:var(--rose-light);color:var(--rose);border:1px solid rgba(225,29,72,0.15)}
.badge-amber{background:var(--amber-light);color:var(--amber);border:1px solid rgba(217,119,6,0.15)}
.badge-cyan{background:var(--cyan-light);color:var(--cyan);border:1px solid rgba(8,145,178,0.15)}

/* ── Typography utils ── */
.section-title{font-family:var(--font-head);font-size:19px;font-weight:800;color:var(--tx);letter-spacing:-.4px}
.section-sub{font-size:13px;color:var(--tx3);margin-top:3px}
.gtext{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gtext-warm{background:var(--grad-warm);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── Toast ── */
.toast{
  position:fixed;top:60px;right:18px;z-index:9998;
  background:#fff;color:var(--tx);
  border:1px solid var(--border);
  padding:11px 18px;border-radius:14px;
  box-shadow:var(--sh-md);
  font-weight:600;font-size:13px;
  display:flex;align-items:center;gap:8px;
  animation:slideUp .25s cubic-bezier(.34,1.3,.64,1);
  font-family:var(--font-body);
  border-left:3px solid var(--emerald);
  min-width:200px;
}

/* ── Table ── */
.ef-table{width:100%;border-collapse:collapse;font-family:var(--font-body)}
.ef-table th{padding:10px 13px;text-align:left;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);border-bottom:2px solid var(--border);background:var(--s2);font-family:var(--font-head)}
.ef-table td{padding:10px 13px;border-bottom:1px solid var(--border);font-size:12px;color:var(--tx2)}
.ef-table tbody tr{transition:background .1s}
.ef-table tbody tr:hover{background:var(--s2)}
.ef-table .ef-table-code{font-weight:800;color:var(--a1);font-size:10px}

/* ── Stat card ── */
.stat-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:16px;
  padding:1.1rem 1.25rem;
  box-shadow:var(--sh);
  transition:all .2s;
  position:relative;overflow:hidden;
}
.stat-card:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.stat-card::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;}
.stat-card.purple::after{background:var(--grad)}
.stat-card.green::after{background:var(--grad-green)}
.stat-card.orange::after{background:var(--grad-warm)}
.stat-card.pink::after{background:var(--grad-pink)}

/* ── Module card (home grid) ── */
.mod-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:16px;
  padding:1.1rem;
  cursor:pointer;
  transition:all .18s cubic-bezier(.4,0,.2,1);
  box-shadow:var(--sh);
  position:relative;overflow:hidden;
}
.mod-card:hover{box-shadow:var(--sh-md);transform:translateY(-3px);border-color:var(--a3)}
.mod-card:active{transform:translateY(-1px)}
.mod-card-icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;margin-bottom:10px;
  transition:transform .2s;
}
.mod-card:hover .mod-card-icon{transform:scale(1.08) rotate(-3deg)}

/* ── Page animation ── */
.page-anim{animation:pageIn .22s ease}

/* ── Pill filter buttons ── */
.ef-pill{
  font-size:11.5px;padding:5px 13px;border-radius:20px;
  border:1.5px solid var(--border);background:transparent;
  color:var(--tx3);cursor:pointer;white-space:nowrap;
  font-weight:500;transition:all .14s;font-family:var(--font-body);
}
.ef-pill.active,.ef-pill:hover{border-color:var(--a1);background:rgba(79,70,229,0.08);color:var(--a1);font-weight:700}

/* ── Section header ── */
.ef-section-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}

/* ── Dividers ── */
.ef-divider{height:1px;background:var(--border);margin:12px 0}

/* ── Gradient banner ── */
.ef-banner{
  border-radius:20px;
  padding:1.5rem 2rem;
  position:relative;overflow:hidden;
  color:#fff;
}
.ef-banner-deco{position:absolute;border-radius:50%;background:rgba(255,255,255,0.06);pointer-events:none;}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageIn{from{opacity:0;transform:translateX(6px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* ── Responsive ── */
@media(max-width:768px){
  :root{--nav-w:0px}
  #ef-sidebar{transform:translateX(-228px);width:228px;transition:transform .25s cubic-bezier(.4,0,.2,1);}
  #ef-sidebar.open{transform:translateX(0);box-shadow:var(--sh-lg);}
  #ef-main{margin-left:0}
  #ef-content{padding:1rem 1rem}
  #ef-topbar{padding:0 1rem}
}
</style>

<script>
async function fbSet(col,uid,data){
  if(window._FIREBASE_OK)await window._db.collection(col).doc(uid).set(data,{merge:true});
  else localStorage.setItem(`ef_${col}`,JSON.stringify(data));
}
async function fbGet(col,uid){
  if(window._FIREBASE_OK){const d=await window._db.collection(col).doc(uid).get();return d.exists?d.data():null;}
  else{const s=localStorage.getItem(`ef_${col}`);return s?JSON.parse(s):null;}
}
async function fbAddSub(col,uid,sub,data){
  if(window._FIREBASE_OK)await window._db.collection(col).doc(uid).collection(sub).add({...data,_ts:firebase.firestore.FieldValue.serverTimestamp()});
  else{const key=`ef_${col}_${sub}`;const prev=JSON.parse(localStorage.getItem(key)||'[]');localStorage.setItem(key,JSON.stringify([{...data,id:Date.now()},...prev].slice(0,30)));}
}
async function fbListSub(col,uid,sub,limit=30){
  if(window._FIREBASE_OK){
    try{const snap=await window._db.collection(col).doc(uid).collection(sub).orderBy('_ts','desc').limit(limit).get();return snap.docs.map(d=>({id:d.id,...d.data()}));}
    catch{return[];}
  }else{const key=`ef_${col}_${sub}`;return JSON.parse(localStorage.getItem(key)||'[]');}
}
async function fbDelSub(col,uid,sub,id){
  if(window._FIREBASE_OK)await window._db.collection(col).doc(uid).collection(sub).doc(id).delete();
  else{const key=`ef_${col}_${sub}`;const prev=JSON.parse(localStorage.getItem(key)||'[]');localStorage.setItem(key,JSON.stringify(prev.filter(x=>x.id!==id)));}
}
</script>

/* ── Helpers de evaluación vinculados a CE reales ── */

// Obtiene los CE del ciclo+bloque seleccionados
const _getCEs=(ciclo,bloque)=>{
  const data=CRIT[ciclo]?.data||[];
  // Primero los CE que se relacionan directamente con el bloque por posición
  // En LOMLOE los bloques de saberes básicos se cruzan con todos los CE;
  // aquí priorizamos los 3 CE más relevantes según el bloque
  const prioridad={
    0:[3,1,5],   // Vida activa y saludable → CE.EF.4 (salud), CE.EF.1, CE.EF.6 (sin 0-index)
    1:[0,1,2],   // Resolución → CE.EF.1, CE.EF.2, CE.EF.3
    2:[0,2,5],   // Organización y gestión → CE.EF.1, CE.EF.3, CE.EF.6/7
    3:[5,2,4],   // Manifestaciones cultura motriz → CE.EF.6, CE.EF.3, CE.EF.5
    4:[5,3,2],   // Interacción entorno → CE.EF.6, CE.EF.4, CE.EF.3
    5:[1,2,4],   // Autorregulación → CE.EF.2, CE.EF.3, CE.EF.5
  };
  const idx=prioridad[bloque]||[0,1,2];
  return idx.map(i=>data[i]).filter(Boolean);
};

// Genera indicadores de logro a partir de los CE reales
const _getIndicadores=(ciclo,bloque,nivel)=>{
  const ces=_getCEs(ciclo,bloque);
  if(!ces.length)return[];
  return ces.flatMap(ce=>ce.items.map(it=>({cod:it.cod,ce:ce.ce,tit:ce.tit,txt:it.txt})));
};

// Genera filas de rúbrica por CE e indicador
const _buildRubricaItems=(ciclo,bloque)=>{
  const indicadores=_getIndicadores(ciclo,bloque);
  return indicadores.slice(0,6).map(ind=>({
    cod:ind.cod,
    ce:ind.ce,
    indicador:ind.txt.length>90?ind.txt.substring(0,88)+"…":ind.txt,
    n4:`Supera el criterio con autonomía plena, creatividad y transferencia a nuevos contextos. Evidencia sólida de ${ind.ce}.`,
    n3:`Alcanza el criterio correctamente con mínimo apoyo. Demuestra comprensión de ${ind.ce} en situaciones habituales.`,
    n2:`Alcanza parcialmente el criterio con apoyo frecuente. En proceso de consolidar ${ind.ce}.`,
    n1:`No alcanza el criterio establecido en ${ind.ce}. Requiere refuerzo e intervención específica.`,
  }));
};

// Genera la lista de cotejo por CE
const _buildListaCotejo=(ciclo,bloque)=>{
  const indicadores=_getIndicadores(ciclo,bloque);
  return indicadores.slice(0,8).map(ind=>({
    cod:ind.cod,
    indicador:ind.txt.length>80?ind.txt.substring(0,78)+"…":ind.txt,
    logrado:"☐ Sí",
    proceso:"☐ En proceso",
    noLogrado:"☐ No",
  }));
};

// Genera ítems de autoevaluación por CE
const _buildAutoEval=(ciclo,bloque)=>{
  const ces=_getCEs(ciclo,bloque);
  const preguntas=[
    "¿He participado activamente en todas las actividades?",
    "¿He respetado las normas y a mis compañeros/as?",
    "¿He esforzado para mejorar mis habilidades?",
    "¿He colaborado con mi grupo de forma positiva?",
    "¿He reflexionado sobre lo que he aprendido?",
  ];
  return ces.slice(0,3).map((ce,i)=>({
    ce:ce.ce,
    pregunta:preguntas[i]||`¿He trabajado el criterio ${ce.ce}?`,
    escala:"1 · 2 · 3 · 4",
    descripcion:`Relacionado con: ${ce.tit}`,
  }));
};

  "Prueba práctica":"Prueba práctica estandarizada referenciada a los CE del ciclo y bloque seleccionados",
};

const _duaDesc={
  "Múltiples medios de representación":"instrucciones en formato visual (pictogramas), verbal y demostrativo; vídeos de referencia si es necesario",
  "Múltiples formas de acción y expresión":"posibilidad de respuesta motriz diversificada: oral, gestual, escrita o práctica según las necesidades del alumnado",
  "Múltiples formas de implicación":"elección de rol, nivel de dificultad y pareja de trabajo; refuerzo positivo continuo y metas individuales ajustadas",
};

const _buildEvalDesc=(instrs,ciclo,bloque,producto)=>{
  const ces=_getCEs(ciclo,bloque);
  const ceRefs=ces.map(c=>c.ce).join(", ");
  const ceTextos=ces.map(c=>`${c.ce} (${c.tit})`).join("; ");
  if(!instrs||instrs.length===0)return`Evaluación continua y formativa mediante observación directa. Criterios de referencia: ${ceRefs}. Se valoran indicadores de logro de ${ceTextos}.`;
  const tiene=i=>instrs.includes(i);
  const momentos=[];
  if(tiene("Observación directa")||tiene("Lista de cotejo"))momentos.push(`Durante la práctica: ${[tiene("Observación directa")&&`escala de valoración referenciada a ${ceRefs}`,tiene("Lista de cotejo")&&`lista de cotejo con indicadores derivados de ${ceRefs}`].filter(Boolean).join("; ")}.`);
  if(tiene("Rúbrica analítica")||tiene("Rúbrica holística"))momentos.push(`Evaluación del desempeño mediante ${tiene("Rúbrica analítica")?"rúbrica analítica por CE":"rúbrica holística"}: criterios ${ceRefs}. Niveles: Sobresaliente, Notable, Aprobado, Insuficiente.`);
  if(tiene("Autoevaluación")||tiene("Coevaluación"))momentos.push(`Evaluación entre iguales y personal: ítems de ${tiene("Autoevaluación")?"autoevaluación":""}${tiene("Autoevaluación")&&tiene("Coevaluación")?" y ":""}${tiene("Coevaluación")?"coevaluación":""} referenciados a ${ceRefs}.`);
  if(tiene("Diario de aprendizaje"))momentos.push(`Diario de aprendizaje: entrada estructurada sobre el logro de ${ceRefs}.`);
  if(tiene("Portfolio"))momentos.push(`Portfolio: evidencias que demuestran el dominio de ${ceRefs}.`);
  if(tiene("Prueba práctica"))momentos.push(`Prueba práctica: tarea motriz diseñada para evaluar ${ceRefs}.`);
  const prod=producto?` Producto final "${producto}" evaluado con ${instrs.includes("Rúbrica analítica")?"rúbrica analítica":instrs.includes("Rúbrica holística")?"rúbrica holística":"lista de cotejo"} referenciada a ${ceRefs}.`:"";
  return momentos.join(" ")+prod;
};

const _buildDUA=(duaSel)=>{
  if(!duaSel||duaSel.length===0)return"Representación: instrucciones visuales, verbales y demostraciones. Acción: múltiples formas de respuesta motriz. Implicación: elección de rol y refuerzo positivo.";
  return duaSel.map(d=>_duaDesc[d]||d).join(" · ");
};

const _buildAtencion=(custom,instrs,ciclo,bloque)=>{
  const base="Agrupamientos flexibles, reglas modificadas y materiales alternativos según necesidades. Apoyo entre iguales y tiempo adicional si es necesario.";
  const evalAdap=instrs&&(instrs.includes("Autoevaluación")||instrs.includes("Coevaluación"))?" Los instrumentos de autoevaluación y coevaluación se adaptan con fichas simplificadas e ítems en lenguaje accesible para el alumnado NEAE.":"";
  const portAdap=instrs&&instrs.includes("Portfolio")?" El portfolio admite evidencias en formato oral, fotográfico o vídeo para alumnado con dificultades de expresión escrita.":"";
  return (custom||base)+evalAdap+portAdap;
};

// Rúbrica con filas reales por CE
const _buildRubrica=(instrs,ciclo,bloque)=>{
  const items=_buildRubricaItems(ciclo,bloque??0);
  const hasRub=instrs&&(instrs.includes("Rúbrica analítica")||instrs.includes("Rúbrica holística"));
  const hasCoe=instrs&&instrs.includes("Coevaluación");
  const hasAuto=instrs&&instrs.includes("Autoevaluación");
  let intro=hasRub
    ?"Rúbrica referenciada a los criterios de evaluación del bloque. Se comparte con el alumnado antes de la actividad."
    :"Niveles de desempeño de referencia para los criterios trabajados.";
  if(hasCoe)intro+=" La coevaluación usa los mismos indicadores adaptados a lenguaje accesible.";
  if(hasAuto)intro+=" La autoevaluación incluye escala de autopercepción del esfuerzo y el aprendizaje.";
  // Formato textual de la rúbrica por CE
  const filas=items.map(it=>`${it.cod}: N4—${it.n4} · N3—${it.n3} · N2—${it.n2} · N1—${it.n1}`).join(" || ");
  return intro+(items.length?` || ${filas}`:"");
};

// Rúbrica estructurada para mostrar en UI (tabla)
const _buildRubricaUI=(ciclo,bloque)=>_buildRubricaItems(ciclo,bloque??0);

// Lista de cotejo estructurada para UI
const _buildListaUI=(ciclo,bloque)=>_buildListaCotejo(ciclo,bloque??0);

// Autoevaluación estructurada para UI
const _buildAutoUI=(ciclo,bloque)=>_buildAutoEval(ciclo,bloque??0);

const _ponderaciones=(instrs)=>{
  if(!instrs||instrs.length===0)return"Participación activa (100%).";
  const pesos=[];
  if(instrs.includes("Rúbrica analítica")||instrs.includes("Rúbrica holística"))pesos.push("Producto/ejecución — rúbrica referenciada a CE (40%)");
  if(instrs.includes("Observación directa")||instrs.includes("Lista de cotejo"))pesos.push("Observación en práctica — escala/cotejo CE (30%)");
  if(instrs.includes("Autoevaluación"))pesos.push("Autoevaluación por CE (15%)");
  if(instrs.includes("Coevaluación"))pesos.push("Coevaluación por CE (15%)");
  if(instrs.includes("Diario de aprendizaje")||instrs.includes("Portfolio"))pesos.push("Evidencias escritas/portfolio CE (20%)");
  if(instrs.includes("Prueba práctica"))pesos.push("Prueba práctica referenciada a CE (25%)");
  if(pesos.length===0)return"Participación activa y actitud (100%).";
  return pesos.join(" · ")+".";
};

const generarSesionLocal=f=>{
  const cy=f.ciclo,bl=f.bloque;
  const instrs=f.instrEval||[];
  const g=(fase,b)=>pick(JUEGOS.filter(j=>j.f===fase&&j.c.includes(cy)&&j.b===b).length?JUEGOS.filter(j=>j.f===fase&&j.c.includes(cy)&&j.b===b):JUEGOS.filter(j=>j.f===fase&&j.c.includes(cy)));
  const cal=g("Cal",bl),pp=g("PP",bl),vac=g("VaC",bl);
  const crit3=(CRIT[cy]?.data||[]).slice(0,3).map(b=>b.ce+" ("+b.tit+"): "+b.items.map(i=>i.cod).join(", ")).join(" · ");
  const mats=f.materiales.length?f.materiales.join(", "):"sin material adicional";
  const evalDesc=_buildEvalDesc(instrs,cy,bl,f.productoFinal);
  const vacLogro=instrs.includes("Autoevaluación")||instrs.includes("Diario de aprendizaje")||instrs.includes("Coevaluación")
    ?"El alumnado reduce la activación y completa la "+(instrs.includes("Coevaluación")?"coevaluación":instrs.includes("Diario de aprendizaje")?"entrada del diario de aprendizaje":"autoevaluación")+" de la sesión."
    :"El alumnado reduce la activación y reflexiona sobre lo aprendido.";
  const vacDesc=vac.ds+" Duración: "+f.faseVaCDur+" min."
    +(instrs.includes("Autoevaluación")?" Se completa ficha de autoevaluación individual (¿qué aprendí?, ¿cómo me he esforzado?, ¿qué mejoraré?).":"")
    +(instrs.includes("Coevaluación")?" Coevaluación por parejas con ficha de criterios acordados previamente.":"")
    +(instrs.includes("Diario de aprendizaje")?" Registro en diario de aprendizaje: entrada breve sobre la sesión.":"");
  const calDesc=(cal.ds+" Duración: "+f.faseCalDur+" min."+(cal.v?" Variante: "+cal.v:"")).trim();
  const calLogro="El alumnado activa el organismo progresivamente trabajando "+cal.o.toLowerCase()+"."
    +(instrs.includes("Observación directa")?" El docente inicia la observación directa desde esta fase.":"");
  const ppDesc=pp.ds+" Duración: "+f.fasePPDur+" min. Materiales: "+mats+"."
    +(instrs.includes("Lista de cotejo")?" Se registra la lista de cotejo durante esta fase.":"")
    +(instrs.includes("Rúbrica analítica")||instrs.includes("Rúbrica holística")?" Se aplica la rúbrica de evaluación al producto o ejecución.":"")
    +(instrs.includes("Prueba práctica")?" Se realiza la prueba práctica en esta fase.":"");
  const ccStr=f.compClave.length?", trabajando las competencias clave: "+f.compClave.join(", "):"";
  const odsStr=f.ods.length?"; conectando con los ODS: "+f.ods.join(", "):"";
  return{
    titulo:f.titulo||"Sesión EF: "+BLQ[bl].substring(0,30),
    objetivo:"Desarrollar competencias motrices vinculadas a \""+BLQ[bl]+"\" fomentando la participación activa e inclusiva en "+CRIT[cy]?.label+ccStr+odsStr+".",
    calentamiento:{nombre:cal.n,desc:calDesc,logro:calLogro},
    parteP:{nombre:pp.n,desc:ppDesc,logro:"El alumnado aplica habilidades motrices específicas desarrollando "+pp.o.toLowerCase()+"."},
    vuelta:{nombre:vac.n,desc:vacDesc,logro:vacLogro},
    criteriosLomloe:crit3||"CE.EF.1, CE.EF.2, CE.EF.3",
    evaluacion:evalDesc,
    ponderacion:_ponderaciones(instrs),
    atencion:_buildAtencion(f.atencionDiv,instrs,cy,bl),
    dua:_buildDUA(f.dua),
    producto:f.productoFinal||"Participación activa y autoevaluación al final de la sesión.",
    observaciones:"Espacio: "+f.espacio+". Materiales: "+mats+". Alumnos: "+f.numAlumnos+". Trimestre: "+f.trimestre+".",
    rubricaUI:_buildRubricaUI(cy,bl),
    listaUI:_buildListaUI(cy,bl),
    autoUI:_buildAutoUI(cy,bl),
  };
};

const generarSALocal=sf=>{
  const cy=sf.ciclo,bl=sf.bloque;
  const instrs=sf.instrEval||[];
  const ppJ=JUEGOS.filter(j=>j.f==="PP"&&j.c.includes(cy)&&j.b===bl);
  const ppA=ppJ.length?ppJ:JUEGOS.filter(j=>j.f==="PP"&&j.c.includes(cy));
  const selPP=rnd(ppA,sf.numSes);
  const evalDesc=_buildEvalDesc(instrs,cy,bl,sf.productoFinal);
  const sesiones=Array.from({length:sf.numSes},(_,i)=>{
    const pp=selPP[i%selPP.length],isF=i===0,isL=i===sf.numSes-1;
    const instrSesion=isF?"Evaluación diagnóstica: observación directa y prueba motriz inicial.":isL?`Evaluación sumativa: ${instrs.length?instrs.join(", "):"rúbrica y autoevaluación"}.`:instrs.filter(x=>["Observación directa","Lista de cotejo"].includes(x)).join(", ")||"Observación directa.";
    return{
      n:i+1,
      titulo:isF?"Sesión 1: Evaluación Inicial y presentación SA":isL?`Sesión ${sf.numSes}: Evaluación Final y Producto`:`Sesión ${i+1}: ${pp?.n||BLQ[bl]}`,
      objetivo:isF?`Diagnóstico inicial en "${BLQ[bl]}" mediante tareas diagnósticas; presentación de la tarea final y criterios de evaluación.`:isL?"Presentación del producto final, autoevaluación, coevaluación y reflexión metacognitiva sobre la SA.":`Desarrollar habilidades motrices en "${BLQ[bl].toLowerCase()}" a través de ${pp?.n||"actividades cooperativas"}.`,
      desc:isF?`Actividades diagnósticas motrices. Presentación de la SA, la tarea final${sf.productoFinal?` (${sf.productoFinal})`:""}${instrs.length?` y los instrumentos de evaluación (${instrs.join(", ")})`:""}. Negociación de criterios de calidad.`:isL?`Presentación grupal del producto${sf.productoFinal?" ("+sf.productoFinal+")":""}. ${instrs.includes("Coevaluación")?"Coevaluación entre grupos con rúbrica. ":""}${instrs.includes("Autoevaluación")?"Autoevaluación individual. ":""}${instrs.includes("Portfolio")?"Revisión del portfolio de evidencias. ":""}Reflexión colectiva sobre los aprendizajes.`:(pp?.ds||"Actividades cooperativas adaptadas al nivel del grupo.")+" Instrumento de sesión: "+instrSesion,
    };
  });
  return{
    titulo:sf.titulo||`SA: ${BLQ[bl]}`,
    justificacion:`Esta SA responde al bloque "${BLQ[bl]}" en ${CRIT[cy]?.label||""} (Decreto 101/2023, Junta de Andalucía). Se fundamenta en el enfoque competencial LOMLOE, el aprendizaje basado en tareas reales y el DUA.${sf.ods?.length?" Se conecta con los ODS: "+sf.ods.join(", ")+".":" "}${sf.compClave?.length?" Competencias clave: "+sf.compClave.join(", ")+".":" "}`,
    tareaFinal:`Diseño y presentación grupal de una propuesta de actividad física relacionada con "${BLQ[bl].toLowerCase()}".`,
    productoFinal:sf.productoFinal||"Dosier grupal, presentación oral y rúbrica de autoevaluación y coevaluación cumplimentada.",
    sesiones,
    criteriosLomloe:(CRIT[cy]?.data||[]).slice(0,4).map(b=>`${b.ce} — ${b.tit}`).join(" | "),
    evaluacion:evalDesc,
    ponderacion:_ponderaciones(instrs),
    rubrica:_buildRubrica(instrs,cy,bl),
    rubricaUI:_buildRubricaUI(cy,bl),
    listaUI:_buildListaUI(cy,bl),
    autoUI:_buildAutoUI(cy,bl),
    interdisciplinariedad:"Ciencias Naturales (salud), Lengua (comunicación oral), Matemáticas (medición), Ciudadanía (valores e igualdad), Educación Artística (expresión corporal).",
    instrumentos:instrs.length?instrs.map(i=>({nombre:i,desc:_instrDesc[i]||i})):[{nombre:"Observación directa",desc:_instrDesc["Observación directa"]}],
  };
};

/* ══ TOAST ══ */
function Toast({msg,onHide}){
  useEffect(()=>{const t=setTimeout(onHide,2500);return()=>clearTimeout(t);},[]);
  return<div className="toast" style={{position:"fixed",top:66,right:20,background:"linear-gradient(135deg,#059669,#10b981)",color:"#fff",padding:"12px 20px",borderRadius:14,fontWeight:700,fontSize:13,zIndex:9998,boxShadow:"0 8px 24px rgba(16,185,129,0.35),0 2px 8px rgba(0,0,0,0.1)",display:"flex",alignItems:"center",gap:8,backdropFilter:"blur(10px)",border:"1px solid rgba(255,255,255,0.2)",fontFamily:"'DM Sans',system-ui",letterSpacing:".1px"}}>{msg}</div>;
}

        {!window._FIREBASE_OK&&<div style={{background:"#fef3c7",border:"1px solid #fde68a",borderRadius:12,padding:"10px 14px",fontSize:12,color:"#92400e",marginBottom:18,textAlign:"left"}}>

/* ══ EDITOR DE LISTAS ══ */
function ListEditor({items,onAdd,onRemove,placeholder}){
  const [val,setVal]=useState("");
  const add=()=>{if(!val.trim())return;onAdd(val.trim());setVal("");};
  return(<div>
    <div style={{display:"flex",gap:8,marginBottom:10}}>
      <input style={inp} value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder={placeholder||"Nuevo elemento..."}/>
      <button onClick={add} style={{background:S.a1,color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>+ Añadir</button>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {items.map((item,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:S.s2,borderRadius:10,border:"1px solid #e2e8f0"}}>
          <span style={{flex:1,fontSize:13,color:S.tx,fontWeight:500}}>{item}</span>
          <button onClick={()=>onRemove(i)} style={{background:"rgba(239,68,68,0.08)",color:"#ef4444",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>Eliminar</button>
        </div>
      ))}
    </div>
  </div>);
}

/* ══ HORARIO ══ */
function HorarioView({cfg,uid}){
  const horas=cfg?.franjas||HRS_DEF;
  const materias=cfg?.materias||Object.keys(HCOL_DEF);
  const colores=cfg?.coloresMaterias||HCOL_DEF;
  const initG=()=>horas.map(()=>DIAS.map(()=>({asig:"",grupo:"",aula:""})));
  const [grid,setGrid]=useState(initG);
  const [ed,setEd]=useState(null);
  const [draft,setDraft]=useState({asig:"",grupo:"",aula:""});
  const [synced,setSynced]=useState(false);
  useEffect(()=>{fbGet("horarios",uid).then(d=>{if(d?.grid){setGrid(d.grid);setSynced(true);}});},[uid]);
  const saveGrid=async(g)=>{setGrid(g);await fbSet("horarios",uid,{grid:g});setSynced(true);};
  const save=()=>{if(!ed)return;const g=grid.map(r=>[...r]);if(!g[ed.r])g[ed.r]=[];g[ed.r][ed.c]={...draft};saveGrid(g);setEd(null);};
  const clr=()=>{const g=grid.map(r=>[...r]);if(!g[ed.r])g[ed.r]=[];g[ed.r][ed.c]={asig:"",grupo:"",aula:""};saveGrid(g);setEd(null);};
  const efN=(grid||[]).flat().filter(c=>c?.asig==="EF").length;
  return(
    <div>
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14,flexWrap:"wrap"}}>
        <span style={{fontWeight:800,fontSize:15,color:S.tx}}>🗓️ Horario del Maestro</span>
        <span style={{background:"rgba(99,102,241,0.1)",color:S.a1,borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:700}}>{efN} sesiones EF/semana</span>
        <span style={{color:synced?"#10b981":S.tx3,fontSize:11,marginLeft:"auto"}}>{synced?"☁️ Sincronizado":"💾 Guardando…"}</span>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:500}}>
          <thead><tr><th style={{width:90,padding:8,fontSize:11,color:S.tx3,textAlign:"left",borderBottom:"1px solid #e2e8f0"}}>Hora</th>
            {DIAS.map(d=><th key={d} style={{padding:8,fontSize:12,color:S.a1,fontWeight:700,textAlign:"center",borderBottom:"1px solid #e2e8f0"}}>{d}</th>)}
          </tr></thead>
          <tbody>{horas.map((h,r)=><tr key={r}>
            <td style={{padding:"6px 8px",fontSize:11,color:S.tx3,whiteSpace:"nowrap"}}>{h}</td>
            {DIAS.map((_,c)=>{const sl=(grid[r]||[])[c]||{};const col=sl.asig?colores[sl.asig]||S.a1:null;return(
              <td key={c} onClick={()=>{setEd({r,c});setDraft({asig:sl.asig||"",grupo:sl.grupo||"",aula:sl.aula||""});}} style={{padding:4,cursor:"pointer"}}>
                <div style={{minHeight:48,borderRadius:10,border:`1px solid ${col?col+"50":"#e2e8f0"}`,background:col?col+"15":S.s2,padding:"5px 7px",display:"flex",flexDirection:"column",justifyContent:"center"}}>
                  {sl.asig?(<><div style={{fontSize:12,fontWeight:700,color:col}}>{sl.asig}</div><div style={{fontSize:10,color:S.tx3}}>{sl.grupo}</div><div style={{fontSize:10,color:S.tx3,opacity:.7}}>{sl.aula}</div></>):<div style={{fontSize:10,color:S.tx3,textAlign:"center"}}>+</div>}
                </div>
              </td>
            );})}
          </tr>)}</tbody>
        </table>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>
        {Object.entries(colores).map(([k,v])=><span key={k} style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:v+"20",color:v,border:`1px solid ${v}40`}}>{k}</span>)}
      </div>
      {ed&&<div className="overlay"><div style={{...card({padding:"1.5rem"}),width:300,maxWidth:"90vw"}}>
        <div style={{fontWeight:700,marginBottom:14,color:S.a1}}>Editar · {DIAS[ed.c]} {horas[ed.r]}</div>
        <div style={{marginBottom:10}}><label style={lbl}>Asignatura</label>
          <select style={inp} value={draft.asig} onChange={e=>setDraft(d=>({...d,asig:e.target.value}))}>
            <option value="">Libre</option>{materias.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>
        <div style={{marginBottom:10}}><label style={lbl}>Grupo</label><input style={inp} value={draft.grupo} onChange={e=>setDraft(d=>({...d,grupo:e.target.value}))} placeholder="Ej: 5ºA"/></div>
        <div style={{marginBottom:14}}><label style={lbl}>Espacio</label><input style={inp} value={draft.aula} onChange={e=>setDraft(d=>({...d,aula:e.target.value}))} placeholder="Patio, Gimnasio…"/></div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={save} style={{flex:1,background:S.a1,color:"#fff",border:"none",borderRadius:10,padding:9,fontWeight:700,cursor:"pointer"}}>Guardar</button>
          <button onClick={clr} style={{padding:"9px 12px",background:"rgba(239,68,68,0.08)",color:"#ef4444",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10,cursor:"pointer"}}>Borrar</button>
          <button onClick={()=>setEd(null)} style={{padding:"9px 12px",background:"transparent",color:S.tx3,border:"1px solid #e2e8f0",borderRadius:10,cursor:"pointer"}}>✕</button>
        </div>
      </div></div>}
    </div>
  );
}

/* ══ CALENDARIO ══ */
function CalendarioView({uid}){
  const today=new Date();
  const [y,setY]=useState(today.getFullYear());
  const [m,setM]=useState(today.getMonth());
  const [events,setEvt]=useState({});
  const [sel,setSel]=useState(null);
  const [draft,setDraft]=useState({titulo:"",tipo:"EF",grupo:""});
  const TIPOS={EF:"#6366f1","Evaluación":"#ec4899","Salida":"#f59e0b","Reunión":"#3b82f6","Examen":"#ef4444","Festivo":"#94a3b8","Otro":"#10b981"};
  useEffect(()=>{fbGet("calendarios",uid).then(d=>{if(d?.events)setEvt(d.events);});},[uid]);
  const saveEvt=async(ev)=>{setEvt(ev);await fbSet("calendarios",uid,{events:ev});};
  const key=d=>`${y}-${m}-${d}`;
  const evOf=d=>events[key(d)]||[];
  const addEv=()=>{if(!draft.titulo)return;const k=key(sel);const ev={...events,[k]:[...(events[k]||[]),{...draft,id:Date.now()}]};saveEvt(ev);setDraft({titulo:"",tipo:"EF",grupo:""});};
  const delEv=(d,id)=>{const k=key(d);const ev={...events,[k]:(events[k]||[]).filter(e=>e.id!==id)};saveEvt(ev);};
  const first=(new Date(y,m,1).getDay()+6)%7;
  const days=new Date(y,m+1,0).getDate();
  return(
    <div>
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14,flexWrap:"wrap"}}>
        <span style={{fontWeight:800,fontSize:15,color:S.tx}}>📅 Calendario Escolar</span>
        <div style={{display:"flex",gap:8,alignItems:"center",marginLeft:"auto"}}>
          <button onClick={()=>{if(m===0){setM(11);setY(v=>v-1);}else setM(v=>v-1);}} style={{background:"transparent",border:"1px solid #e2e8f0",borderRadius:8,color:S.tx,cursor:"pointer",padding:"4px 10px"}}>‹</button>
          <span style={{fontWeight:700,color:"#f59e0b",minWidth:130,textAlign:"center"}}>{MES_N[m]} {y}</span>
          <button onClick={()=>{if(m===11){setM(0);setY(v=>v+1);}else setM(v=>v+1);}} style={{background:"transparent",border:"1px solid #e2e8f0",borderRadius:8,color:S.tx,cursor:"pointer",padding:"4px 10px"}}>›</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
        {["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"].map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:S.tx3,padding:"5px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {Array.from({length:first}).map((_,i)=><div key={"e"+i}/>)}
        {Array.from({length:days},(_,i)=>i+1).map(d=>{
          const isT=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
          const evs=evOf(d);
          return<div key={d} onClick={()=>setSel(sel===d?null:d)} style={{minHeight:50,borderRadius:10,border:`1px solid ${sel===d?"rgba(99,102,241,0.5)":isT?"#c7d2fe":"#e2e8f0"}`,background:sel===d?"#eef2ff":isT?"#f0f4ff":S.s2,padding:"3px 4px",cursor:"pointer"}}>
            <div style={{fontSize:12,fontWeight:isT?700:400,color:isT?S.a1:S.tx2,marginBottom:2}}>{d}</div>
            {evs.slice(0,2).map(e=><div key={e.id} style={{fontSize:9,borderRadius:4,padding:"1px 3px",background:(TIPOS[e.tipo]||S.a1)+"30",color:TIPOS[e.tipo]||S.a1,marginBottom:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.titulo}</div>)}
            {evs.length>2&&<div style={{fontSize:9,color:S.tx3}}>+{evs.length-2}</div>}
          </div>;
        })}
      </div>
      {sel&&<div style={{...card({padding:"1.1rem",marginTop:10,borderColor:"#c7d2fe"})}}>
        <div style={{fontWeight:700,color:S.a1,marginBottom:10}}>{sel} de {MES_N[m]} de {y}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr auto",gap:8,marginBottom:10,alignItems:"end"}}>
          <div><label style={lbl}>Título</label><input style={inp} value={draft.titulo} onChange={e=>setDraft(d=>({...d,titulo:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addEv()} placeholder="Ej: EF 5ºA"/></div>
          <div><label style={lbl}>Tipo</label><select style={inp} value={draft.tipo} onChange={e=>setDraft(d=>({...d,tipo:e.target.value}))}>{Object.keys(TIPOS).map(t=><option key={t}>{t}</option>)}</select></div>
          <div><label style={lbl}>Grupo</label><input style={inp} value={draft.grupo} onChange={e=>setDraft(d=>({...d,grupo:e.target.value}))} placeholder="5ºA"/></div>
          <button onClick={addEv} style={{background:S.a1,color:"#fff",border:"none",borderRadius:10,padding:"9px 12px",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>+ Añadir</button>
        </div>
        {evOf(sel).map(e=><div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:(TIPOS[e.tipo]||S.a1)+"10",borderRadius:10,border:`1px solid ${(TIPOS[e.tipo]||S.a1)}30`,marginBottom:5}}>
          <span style={{fontSize:10,fontWeight:700,color:TIPOS[e.tipo]||S.a1,background:(TIPOS[e.tipo]||S.a1)+"20",borderRadius:6,padding:"2px 6px"}}>{e.tipo}</span>
          <span style={{fontWeight:600,fontSize:12,flex:1}}>{e.titulo}</span>
          {e.grupo&&<span style={{fontSize:11,color:S.tx3}}>{e.grupo}</span>}
          <button onClick={()=>delEv(sel,e.id)} style={{background:"transparent",border:"none",color:"#ef4444",cursor:"pointer",fontSize:16}}>×</button>
        </div>)}
        {evOf(sel).length===0&&<p style={{color:S.tx3,fontSize:12}}>Sin eventos. Añade uno arriba.</p>}
      </div>}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>
        {Object.entries(TIPOS).map(([k,v])=><span key={k} style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:v+"20",color:v,border:`1px solid ${v}40`}}>{k}</span>)}
      </div>
    </div>
  );
}

/* ══ MIS SESIONES ══ */

              <div key={l} style={{background:S.s2,borderRadius:8,padding:"6px 8px"}}><div style={{fontSize:10,color:S.tx3,textTransform:"uppercase"}}>{l}</div><div style={{fontSize:12,fontWeight:700,color:S.tx}}>{v}</div></div>

/* ══ SEGUIMIENTO DE ALUMNADO ══ */
const NIVELES_CE={4:{label:"Sobresaliente",color:"#10b981",short:"SB"},3:{label:"Notable",color:"#3b82f6",short:"NT"},2:{label:"Aprobado",color:"#f59e0b",short:"AP"},1:{label:"Insuficiente",color:"#ef4444",short:"IN"},0:{label:"—",color:"#e2e8f0",short:"—"}};
function SeguimientoView({uid,cfg}){
  const [grupos,setGrupos]=useState({});
  const [selGrupo,setSelGrupo]=useState(cfg?.cursos?.[0]||"");
  const [selCiclo,setSelCiclo]=useState("C2");
  const [synced,setSynced]=useState(false);
  const [editAlumno,setEditAlumno]=useState(null);
  const [nuevoNombre,setNuevoNombre]=useState("");
  const [tab,setTab]=useState("tabla");
  useEffect(()=>{fbGet("seguimiento",uid).then(d=>{if(d)setGrupos(d);setSynced(true);});},[uid]);
  const save=async(g)=>{setGrupos(g);await fbSet("seguimiento",uid,g);setSynced(true);};
  const gData=grupos[selGrupo]||{alumnos:[],notas:{}};
  const ceList=(CRIT[selCiclo]?.data||[]).flatMap(b=>b.items.map(it=>({...it,blk:b.ce,tit:b.tit,color:CRIT[selCiclo].color})));
  const addAlumno=()=>{
    if(!nuevoNombre.trim())return;
    const g={...grupos,[selGrupo]:{...gData,alumnos:[...(gData.alumnos||[]),{id:Date.now(),nombre:nuevoNombre.trim()}]}};
    save(g);setNuevoNombre("");
  };
  const delAlumno=(id)=>{
    const g={...grupos,[selGrupo]:{...gData,alumnos:gData.alumnos.filter(a=>a.id!==id)}};save(g);
  };
  const setNota=(alumnoId,ceCod,nivel)=>{
    const notas={...(gData.notas||{}),[alumnoId+"__"+ceCod]:nivel};
    const g={...grupos,[selGrupo]:{...gData,notas}};save(g);
  };
  const getNota=(alumnoId,ceCod)=>gData.notas?.[alumnoId+"__"+ceCod]||0;
  // Media por alumno
  const mediaAlumno=(alumnoId)=>{
    const vals=ceList.map(ce=>getNota(alumnoId,ce.cod)).filter(v=>v>0);
    return vals.length?( vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):"—";
  };
  // Media por CE
  const mediaCE=(ceCod)=>{
    const vals=(gData.alumnos||[]).map(a=>getNota(a.id,ceCod)).filter(v=>v>0);
    return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):"—";
  };
  const pct=(alumnoId)=>{
    const vals=ceList.map(ce=>getNota(alumnoId,ce.cod)).filter(v=>v>0);
    return vals.length?Math.round(vals.length/ceList.length*100):0;
  };
  return(
    <div>
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14,flexWrap:"wrap"}}>
        <span style={{fontWeight:800,fontSize:17,color:S.tx}}>👥 Seguimiento del Alumnado</span>
        <span style={{fontSize:11,color:synced?"#10b981":S.tx3}}>{synced?"☁️ Guardado":"💾 Guardando…"}</span>
      </div>
      {/* Controles */}
      <div style={{...card({padding:"1rem",marginBottom:12})}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"end"}}>
          <div style={{flex:1,minWidth:140}}><label style={lbl}>Grupo</label>
            <select style={inp} value={selGrupo} onChange={e=>setSelGrupo(e.target.value)}>
              {(cfg?.cursos||[]).map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div style={{flex:1,minWidth:140}}><label style={lbl}>Ciclo/Etapa</label>
            <select style={inp} value={selCiclo} onChange={e=>setSelCiclo(e.target.value)}>
              {Object.entries(CRIT).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          <div style={{flex:2,minWidth:200}}><label style={lbl}>Añadir alumno/a</label>
            <div style={{display:"flex",gap:6}}>
              <input style={inp} value={nuevoNombre} onChange={e=>setNuevoNombre(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addAlumno()} placeholder="Nombre y apellidos…"/>
              <button onClick={addAlumno} style={{background:S.a1,color:"#fff",border:"none",borderRadius:10,padding:"8px 14px",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>+ Añadir</button>
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            {["tabla","resumen"].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"8px 14px",borderRadius:10,border:`1px solid ${tab===t?S.a1:"#e2e8f0"}`,background:tab===t?S.a1:"#fff",color:tab===t?"#fff":S.tx2,fontWeight:700,cursor:"pointer",fontSize:12}}>{t==="tabla"?"📋 Tabla CE":"📊 Resumen"}</button>)}
          </div>
        </div>
      </div>
      {(gData.alumnos||[]).length===0?<div style={{...card({padding:"3rem",textAlign:"center"})}}>
        <div style={{fontSize:48,marginBottom:12}}>👥</div>
        <p style={{color:S.tx3}}>Añade alumnos/as para comenzar el seguimiento por criterios de evaluación.</p>
      </div>:tab==="tabla"?
      /* TABLA CE × ALUMNOS */
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",fontSize:10,minWidth:600}}>
          <thead><tr>
            <th style={{padding:"8px 10px",textAlign:"left",borderBottom:"2px solid #e2e8f0",minWidth:140,position:"sticky",left:0,background:"#fff",zIndex:2}}>Alumno/a</th>
            {ceList.map(ce=><th key={ce.cod} title={ce.txt} style={{padding:"5px 3px",textAlign:"center",borderBottom:"2px solid #e2e8f0",minWidth:38,color:ce.color,writingMode:"vertical-lr",transform:"rotate(180deg)",height:90,fontSize:9,fontWeight:700}}>{ce.cod}</th>)}
            <th style={{padding:"5px 8px",textAlign:"center",borderBottom:"2px solid #e2e8f0",minWidth:60,color:S.tx2,fontWeight:700}}>Media</th>
            <th style={{padding:"5px 8px",textAlign:"center",borderBottom:"2px solid #e2e8f0",minWidth:55,color:S.tx2,fontWeight:700}}>% eval.</th>
          </tr></thead>
          <tbody>
            {(gData.alumnos||[]).map((a,ai)=><tr key={a.id} style={{background:ai%2===0?"#fff":S.s2}}>
              <td style={{padding:"5px 10px",fontWeight:600,fontSize:11,color:S.tx,position:"sticky",left:0,background:ai%2===0?"#fff":S.s2,zIndex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {a.nombre}
                  <button onClick={()=>delAlumno(a.id)} style={{background:"transparent",border:"none",color:"#ef4444",cursor:"pointer",fontSize:12,padding:0,opacity:.5}}>×</button>
                </div>
              </td>
              {ceList.map(ce=>{
                const n=getNota(a.id,ce.cod);
                const nv=NIVELES_CE[n];
                return<td key={ce.cod} style={{padding:2,textAlign:"center"}}>
                  <select value={n} onChange={e=>setNota(a.id,ce.cod,+e.target.value)}
                    style={{width:36,height:26,border:`1px solid ${n>0?nv.color+"60":"#e2e8f0"}`,borderRadius:6,background:n>0?nv.color+"20":"transparent",color:n>0?nv.color:"#94a3b8",fontSize:10,fontWeight:700,textAlign:"center",cursor:"pointer",outline:"none"}}>
                    {[0,1,2,3,4].map(v=><option key={v} value={v}>{NIVELES_CE[v].short}</option>)}
                  </select>
                </td>;
              })}
              <td style={{padding:"5px 8px",textAlign:"center",fontWeight:800,fontSize:12,color:S.a1}}>{mediaAlumno(a.id)}</td>
              <td style={{padding:"5px 8px",textAlign:"center"}}>
                <div style={{fontSize:10,fontWeight:700,color:pct(a.id)>80?"#10b981":pct(a.id)>50?"#f59e0b":"#94a3b8"}}>{pct(a.id)}%</div>
              </td>
            </tr>)}
            {/* Fila media CE */}
            <tr style={{borderTop:"2px solid #e2e8f0",background:"#f0f4ff"}}>
              <td style={{padding:"5px 10px",fontWeight:800,fontSize:11,color:S.a1,position:"sticky",left:0,background:"#f0f4ff",zIndex:1}}>Media del grupo</td>
              {ceList.map(ce=>{
                const m=parseFloat(mediaCE(ce.cod));
                const col=!isNaN(m)?m>=3.5?"#10b981":m>=2.5?"#3b82f6":m>=1.5?"#f59e0b":"#ef4444":"#e2e8f0";
                return<td key={ce.cod} style={{padding:"5px 3px",textAlign:"center",fontWeight:800,fontSize:10,color:col}}>{mediaCE(ce.cod)}</td>;
              })}
              <td colSpan={2}/>
            </tr>
          </tbody>
        </table>
        <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
          {Object.entries(NIVELES_CE).filter(([k])=>k>0).reverse().map(([k,v])=><span key={k} style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:v.color+"20",color:v.color,border:`1px solid ${v.color}40`,fontWeight:700}}>{v.short} = {v.label}</span>)}
        </div>
      </div>:
      /* RESUMEN */
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
        {(gData.alumnos||[]).map(a=>{
          const media=parseFloat(mediaAlumno(a.id));
          const pc=pct(a.id);
          const col=!isNaN(media)?media>=3.5?"#10b981":media>=2.5?"#3b82f6":media>=1.5?"#f59e0b":"#ef4444":"#94a3b8";
          const cePend=ceList.filter(ce=>getNota(a.id,ce.cod)===0);
          const ceFail=ceList.filter(ce=>getNota(a.id,ce.cod)===1);
          return<div key={a.id} style={card({padding:"1rem",borderLeft:`3px solid ${col}`})}>

            </div>

              <div style={{height:"100%",width:pc+"%",background:col,borderRadius:6}}/>

            <div style={{fontSize:10,color:S.tx3,marginBottom:6}}>{pc}% criterios evaluados · {ceList.length-cePend.length}/{ceList.length}</div>

              ⚠️ Insuficiente: {ceFail.map(c=>c.cod).join(", ")}
            </div>}
          </div>;
        })}
      </div>}
    </div>
  );
}

const NIVEL_TEST=["Muy bajo","Bajo","Medio","Alto","Muy alto"];
const evalTest=(test,edad,sexo,valor)=>{
  const t=TESTS[test];if(!t)return null;
  const ages=Object.keys(t.baremos.M).map(Number).sort((a,b)=>a-b);
  const edadKey=ages.reduce((p,c)=>Math.abs(c-edad)<Math.abs(p-edad)?c:p);
  const baremo=t.baremos[sexo]?.[edadKey];if(!baremo)return null;
  const inv=test==="velocidad";// En velocidad, menos es mejor
  let nivel=0;
  for(let i=0;i<5;i++){if(!inv&&valor>=baremo[i])nivel=i+1;else if(inv&&valor<=baremo[i])nivel=5-i;}
  return{nivel:Math.max(1,Math.min(5,nivel)),label:NIVEL_TEST[Math.max(0,Math.min(4,nivel-1))],baremo,color:["#ef4444","#f97316","#f59e0b","#3b82f6","#10b981"][Math.max(0,Math.min(4,nivel-1))]};
};

/* ══ TIMER DE SESIÓN ══ */
function TimerView(){
  const PHASES=[{key:"Cal",label:"🔥 Calentamiento",color:"#f59e0b",def:15},{key:"PP",label:"⚡ Parte Principal",color:"#6366f1",def:35},{key:"VaC",label:"🌿 Vuelta a la Calma",color:"#10b981",def:10}];
  const [times,setTimes]=useState({Cal:15,PP:35,VaC:10});
  const [phase,setPhase]=useState(0);
  const [secs,setSecs]=useState(15*60);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const [notes,setNotes]=useState("");
  const intRef=useRef(null);
  const ph=PHASES[phase];
  useEffect(()=>{setSecs(times[PHASES[phase].key]*60);setDone(false);},[phase,times]);
  useEffect(()=>{
    if(running){intRef.current=setInterval(()=>setSecs(s=>{if(s<=1){clearInterval(intRef.current);setRunning(false);setDone(true);return 0;}return s-1;}),1000);}
    else clearInterval(intRef.current);
    return()=>clearInterval(intRef.current);
  },[running,phase]);
  const mm=String(Math.floor(secs/60)).padStart(2,"0"),ss2=String(secs%60).padStart(2,"0");
  const pct=secs/(times[ph.key]*60)*100;
  const total=Object.values(times).reduce((a,b)=>a+b,0);
  return(
    <div style={{maxWidth:560,margin:"0 auto"}}>
      <div style={{fontWeight:800,fontSize:17,color:S.tx,marginBottom:16}}>⏱️ Timer de Sesión</div>
      <div style={{...card({padding:"1rem",marginBottom:14})}}>
        <div style={{fontSize:11,color:S.tx3,fontWeight:700,marginBottom:10,textTransform:"uppercase"}}>Duración de cada fase (min)</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          {PHASES.map(p=><div key={p.key}><label style={{...lbl,color:p.color}}>{p.label}</label>
            <input type="number" style={{...inp,borderColor:p.color+"50",textAlign:"center",fontWeight:700,fontSize:16}} value={times[p.key]} min={1} max={90}
              onChange={e=>{const v=+e.target.value;setTimes(t=>({...t,[p.key]:v}));if(!running&&PHASES[phase].key===p.key)setSecs(v*60);}}/></div>)}
        </div>
        <div style={{textAlign:"center",fontSize:11,color:S.tx3,marginTop:8}}>Total sesión: <strong>{total} min</strong></div>
      </div>
      <div style={{...card({padding:"2rem",textAlign:"center",marginBottom:14,borderColor:ph.color+"50",background:`linear-gradient(135deg,${ph.color}08,#fff)`})}}>
        <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:20}}>
          {PHASES.map((p,i)=><button key={p.key} onClick={()=>{setPhase(i);setRunning(false);setSecs(times[p.key]*60);setDone(false);}} style={{padding:"6px 14px",borderRadius:20,border:`2px solid ${i===phase?p.color:"#e2e8f0"}`,background:i===phase?p.color+"20":"transparent",color:i===phase?p.color:S.tx3,fontWeight:i===phase?700:400,cursor:"pointer",fontSize:12}}>{p.label}</button>)}
        </div>
        <div style={{position:"relative",display:"inline-block",marginBottom:20}}>
          <svg width={200} height={200} style={{transform:"rotate(-90deg)"}}>
            <circle cx={100} cy={100} r={88} fill="none" stroke="#e2e8f0" strokeWidth={10}/>
            <circle cx={100} cy={100} r={88} fill="none" stroke={done?"#10b981":ph.color} strokeWidth={10}
              strokeDasharray={553} strokeDashoffset={553*(1-pct/100)} strokeLinecap="round"
              style={{transition:"stroke-dashoffset .5s linear,stroke .3s"}}/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontSize:46,fontWeight:800,color:done?"#10b981":ph.color,fontVariantNumeric:"tabular-nums",letterSpacing:-2}}>{done?"✓":mm+":"+ss2}</div>
            <div style={{fontSize:11,color:S.tx3,marginTop:2}}>{done?"¡Completada!":"restante"}</div>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:10}}>
          <button onClick={()=>{setSecs(times[ph.key]*60);setRunning(false);setDone(false);}} style={{background:S.s2,color:S.tx2,border:"1px solid #e2e8f0",borderRadius:12,padding:"10px 18px",fontWeight:700,cursor:"pointer",fontSize:13}}>↺ Reset</button>
          <button onClick={()=>setRunning(r=>!r)} style={{background:running?"#ef4444":ph.color,color:"#fff",border:"none",borderRadius:12,padding:"10px 28px",fontWeight:800,cursor:"pointer",fontSize:16,minWidth:100}}>{running?"⏸ Pausa":"▶ Iniciar"}</button>
          {phase<2&&<button onClick={()=>{setPhase(p=>p+1);setRunning(false);}} style={{background:PHASES[phase+1].color,color:"#fff",border:"none",borderRadius:12,padding:"10px 18px",fontWeight:700,cursor:"pointer",fontSize:13}}>Siguiente →</button>}
        </div>
        {done&&phase<2&&<div style={{marginTop:14,padding:"10px 16px",background:"#f0fdf4",borderRadius:12,border:"1px solid #bbf7d0",color:"#166534",fontSize:13,fontWeight:600}}>
          ✅ Pasa a: {PHASES[phase+1].label}
          <button onClick={()=>{setPhase(p=>p+1);setRunning(false);}} style={{marginLeft:12,background:"#10b981",color:"#fff",border:"none",borderRadius:8,padding:"4px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>Ir →</button>
        </div>}
      </div>
      <div style={{...card({padding:"1rem",marginBottom:14})}}>
        <div style={{fontSize:11,color:S.tx3,fontWeight:700,marginBottom:8,textTransform:"uppercase"}}>Progreso global de la sesión</div>
        <div style={{display:"flex",gap:3,height:14,borderRadius:8,overflow:"hidden"}}>
          {PHASES.map((p,i)=><div key={p.key} style={{width:`${times[p.key]/total*100}%`,background:i<phase?"#10b981":i===phase?ph.color+"90":p.color+"25",transition:"background .3s"}}/>)}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
          {PHASES.map((p,i)=><span key={p.key} style={{fontSize:10,color:i===phase?p.color:S.tx3,fontWeight:i===phase?700:400}}>{p.label.split(" ").slice(1).join(" ")} {times[p.key]}′</span>)}
        </div>
      </div>
      <div style={card({padding:"1rem"})}><div style={{fontSize:11,color:S.tx3,fontWeight:700,marginBottom:8,textTransform:"uppercase"}}>📝 Notas de la sesión</div>
        <textarea style={{...inp,height:80,resize:"vertical"}} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Incidencias, observaciones, ideas para la próxima sesión…"/>
      </div>
    </div>
  );
}

function StatsView({uid,onNav}){

  const totalCE=Object.values(CRIT).reduce((a,v)=>a+v.data.reduce((b,d)=>b+d.items.length,0),0);
  const ceWorked=new Set();
  sesiones.forEach(s=>{const cy=s.form?.ciclo||Object.keys(CRIT).find(k=>CRIT[k].label===s.ciclo);if(cy&&CRIT[cy])CRIT[cy].data.forEach(b=>b.items.forEach(it=>ceWorked.add(it.cod)));});

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>
        <div style={{...card({padding:"1.25rem",gridColumn:"1/-1"})}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:14}}>
            {[{l:"Sesiones guardadas",v:sesiones.length,c:S.a1,i:"📋"},{l:"Criterios cubiertos",v:`${ceWorked.size}/${totalCE}`,c:"#10b981",i:"📊"},{l:"Cobertura curricular",v:`${coveragePct}%`,c:"#f59e0b",i:"🎯"},{l:"Actividades disponibles",v:JUEGOS.length,c:"#ec4899",i:"🎮"}].map(k=>(
              <div key={k.l} style={{background:`${k.c}10`,borderRadius:14,padding:"1rem",border:`1px solid ${k.c}30`,textAlign:"center"}}>
                <div style={{fontSize:26,marginBottom:4}}>{k.i}</div>
                <div style={{fontSize:22,fontWeight:800,color:k.c}}>{k.v}</div>
                <div style={{fontSize:11,color:S.tx3,marginTop:2}}>{k.l}</div>

                {v.data.map(blk=>{const bw=blk.items.filter(it=>ceWorked.has(it.cod)).length;return<div key={blk.ce} style={{display:"flex",justifyContent:"space-between",fontSize:10,color:S.tx3,marginTop:3}}><span>{blk.ce}</span><span style={{color:bw===blk.items.length?"#10b981":bw>0?"#f59e0b":S.tx3,fontWeight:600}}>{bw===blk.items.length?"✓":`${bw}/${blk.items.length}`}</span></div>;})}
              </div>;
            })}
          </div>
        </div>
      </div>}
    </div>
  );
}

              </div>

        </div>

        <div style={{marginBottom:10}}><label style={lbl}>SA / Unidad Didáctica</label><input style={inp} value={draft.titulo||""} onChange={e=>setDraft(d=>({...d,titulo:e.target.value}))} placeholder="Nombre de la SA o UD…"/></div>
        <div style={{marginBottom:14}}><label style={lbl}>Nota</label><textarea style={{...inp,height:50,resize:"vertical"}} value={draft.nota||""} onChange={e=>setDraft(d=>({...d,nota:e.target.value}))} placeholder="Materiales, observaciones…"/></div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{if(draft.bloque!==""||draft.titulo){const p={...prog,[`${sel.g}__${sel.i}`]:{...draft,bloque:draft.bloque!==""?+draft.bloque:undefined}};save(p);}setSel(null);}} style={{flex:1,background:S.a1,color:"#fff",border:"none",borderRadius:10,padding:9,fontWeight:700,cursor:"pointer"}}>Guardar</button>

const NOTA_LABELS={1:"IN",2:"SU",3:"BI",4:"NT",5:"SB"};

function califMedia(notas){
  const vals=Object.values(notas||{}).filter(v=>v>0);
  return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length):0;
}
function mediaToNota(m){
  if(m>=4.5)return 5;if(m>=3.5)return 4;if(m>=2.5)return 3;if(m>=1.5)return 2;if(m>0)return 1;return 0;
}

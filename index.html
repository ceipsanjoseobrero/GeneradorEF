                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr style={{background:S.s2}}>
                      <th style={{padding:"6px 8px",textAlign:"left",borderBottom:"2px solid #e2e8f0",color:S.a1,width:60}}>CE</th>
                      <th style={{padding:"6px 8px",textAlign:"left",borderBottom:"2px solid #e2e8f0",color:S.tx2,minWidth:180}}>Indicador de logro</th>
                      {["N4 — Sobresaliente","N3 — Notable","N2 — Aprobado","N1 — Insuficiente"].map(n=><th key={n} style={{padding:"6px 8px",textAlign:"left",borderBottom:"2px solid #e2e8f0",color:S.tx3,minWidth:130}}>{n}</th>)}
                    </tr></thead>
                    <tbody>{planIA.rubricaUI.map((row,i)=><tr key={i} style={{borderBottom:"1px solid #f1f5f9",background:i%2===0?"#fff":S.s2}}>
                      <td style={{padding:"6px 8px",fontWeight:700,color:S.a1,fontSize:10}}>{row.cod}</td>
                      <td style={{padding:"6px 8px",color:S.tx2,fontSize:11,lineHeight:1.5}}>{row.indicador}</td>
                      {[row.n4,row.n3,row.n2,row.n1].map((n,j)=><td key={j} style={{padding:"6px 8px",fontSize:10,color:S.tx2,lineHeight:1.5,borderLeft:"1px solid #f1f5f9"}}>{n}</td>)}
                    </tr>)}</tbody>
                  </table>
                </div>
              </div>}
              {form.instrEval.includes("Lista de cotejo")&&planIA.listaUI?.length>0&&<div style={card({padding:"1.1rem"})}>
                <div style={{fontSize:12,fontWeight:800,color:"#3b82f6",marginBottom:10}}>☑️ LISTA DE COTEJO — indicadores derivados de CE · {CRIT[form.ciclo]?.label}</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr style={{background:S.s2}}>
                      <th style={{padding:"6px 8px",textAlign:"left",borderBottom:"2px solid #e2e8f0",color:"#3b82f6",width:60}}>CE</th>
                      <th style={{padding:"6px 8px",textAlign:"left",borderBottom:"2px solid #e2e8f0",color:S.tx2}}>Indicador</th>
                      {["Logrado","En proceso","No logrado"].map(l=><th key={l} style={{padding:"6px 8px",textAlign:"center",borderBottom:"2px solid #e2e8f0",color:S.tx3,width:90}}>{l}</th>)}
                    </tr></thead>
                    <tbody>{planIA.listaUI.map((row,i)=><tr key={i} style={{borderBottom:"1px solid #f1f5f9",background:i%2===0?"#fff":S.s2}}>
                      <td style={{padding:"6px 8px",fontWeight:700,color:"#3b82f6",fontSize:10}}>{row.cod}</td>
                      <td style={{padding:"6px 8px",color:S.tx2,fontSize:11}}>{row.indicador}</td>
                      {["☐","☐","☐"].map((c,j)=><td key={j} style={{padding:"6px 8px",textAlign:"center",fontSize:16,color:S.tx3}}>{c}</td>)}
                    </tr>)}</tbody>
                  </table>
                </div>
              </div>}
              {(form.instrEval.includes("Autoevaluación")||form.instrEval.includes("Coevaluación"))&&planIA.autoUI?.length>0&&<div style={card({padding:"1.1rem"})}>
                <div style={{fontSize:12,fontWeight:800,color:"#10b981",marginBottom:10}}>🪞 {form.instrEval.includes("Autoevaluación")?"AUTOEVALUACIÓN":"COEVALUACIÓN"} — ítems derivados de CE</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {planIA.autoUI.map((item,i)=><div key={i} style={{background:S.s2,borderRadius:10,padding:"10px 14px",border:"1px solid #e2e8f0"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",gap:8,flexWrap:"wrap"}}>
                      <div style={{flex:1}}>
                        <span style={{fontSize:10,fontWeight:700,color:"#10b981",marginRight:8}}>{item.ce}</span>
                        <span style={{fontSize:12,color:S.tx}}>{item.pregunta}</span>
                        <div style={{fontSize:10,color:S.tx3,marginTop:2}}>{item.descripcion}</div>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        {[1,2,3,4].map(n=><div key={n} style={{width:28,height:28,borderRadius:"50%",border:"2px solid #10b981",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#10b981"}}>{n}</div>)}
                      </div>
                    </div>
                  </div>)}
                  <div style={{background:"#f0fdf4",borderRadius:10,padding:"8px 12px",fontSize:11,color:"#166534",border:"1px solid #bbf7d0"}}>
                    1 = Necesito mejorar mucho · 2 = En proceso · 3 = Lo consigo con ayuda · 4 = Lo consigo solo/a con autonomía
                  </div>
                </div>
              </div>}
            </div>}
          </div>
        </div>}

        {/* ── REPOSITORIO ── */}
        {view==="repo"&&<div>
          <div style={{...card({padding:"1rem",marginBottom:12})}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
              <input style={{...inp,width:180}} placeholder="🔍 Buscar..." value={busq} onChange={e=>setBusq(e.target.value)}/>
              {[{l:"Fase",v:fFase,s:setFFase,o:["Todas","Calentamiento","Parte Principal","Vuelta a la Calma"]},{l:"Bloque",v:fB,s:setFB,o:["Todos",...BLQ.map((_,i)=>String(i))]},{l:"Ciclo",v:fC,s:setFC,o:["Todos","C1","C2","C3","ESO"]},{l:"Espacio",v:fE,s:setFE,o:["Todos","Patio","Gimnasio","Aula","Exterior"]}].map((f,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:11,color:S.tx2}}>{f.l}:</span>
                  <select style={{...inp,width:"auto",padding:"6px 9px"}} value={f.v} onChange={e=>f.s(e.target.value)}>
                    {f.o.map(o=><option key={o} value={o}>{f.l==="Bloque"&&o!=="Todos"?BLQ[+o]?.substring(0,18)+"…":o}</option>)}
                  </select>
                </div>
              ))}
              <span style={{marginLeft:"auto",color:S.tx3,fontSize:12,fontWeight:600}}>{juegos.length}/{JUEGOS.length}</span>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(255px,1fr))",gap:10}}>
            {juegos.map(j=><div key={j.id} onClick={()=>setJSel(jSel?.id===j.id?null:j)} style={{...card({padding:"1.1rem",cursor:"pointer",borderColor:jSel?.id===j.id?FC[j.f]+"60":"#e2e8f0"})}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:11,fontWeight:700,color:FC[j.f]}}>{FI[j.f]} {FN[j.f]}</span>
                <span style={{fontSize:11,background:S.s2,borderRadius:10,padding:"1px 7px",color:S.tx3}}>{j.d}′</span>
              </div>
              <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{j.n}</div>
              <p style={{margin:"0 0 7px",fontSize:12,color:S.tx2,lineHeight:1.5}}>{j.ds.substring(0,80)}{j.ds.length>80?"…":""}</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                <span style={{fontSize:10,background:FC[j.f]+"15",color:FC[j.f],borderRadius:8,padding:"2px 6px"}}>{j.o}</span>
                {j.c.map(c=><span key={c} style={{fontSize:10,background:S.s2,color:S.tx3,borderRadius:8,padding:"2px 5px"}}>{c}</span>)}
              </div>
              {jSel?.id===j.id&&<div style={{marginTop:9,paddingTop:9,borderTop:"1px solid #f1f5f9"}}>
                <p style={{margin:"0 0 7px",fontSize:12,color:S.tx2,lineHeight:1.6}}>{j.ds}</p>
                <div style={{background:S.s2,borderRadius:8,padding:"6px 9px",fontSize:11,color:S.tx3,marginBottom:6}}>♻️ {j.v}</div>
                <div style={{display:"flex",gap:10,fontSize:10,color:S.tx3,flexWrap:"wrap"}}>
                  <span>📍 {j.e.join(", ")}</span><span>🎯 {BLQ[j.b]?.substring(0,20)}…</span>
                </div>
              </div>}
            </div>)}
            {juegos.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"3rem",color:S.tx3}}>Sin actividades con estos filtros</div>}
          </div>
        </div>}

        {/* ── CRITERIOS ── */}
        {view==="crit"&&<div>
          <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",flex:1}}>
              {Object.entries(CRIT).map(([k,v])=><button key={k} onClick={()=>setCicloSel(k)} style={{padding:"7px 16px",borderRadius:20,border:`1px solid ${v.color}50`,cursor:"pointer",fontWeight:700,fontSize:13,background:cicloSel===k?v.color:"#fff",color:cicloSel===k?"#fff":v.color}}>{v.label}</button>)}
            </div>
            <button onClick={()=>printCriterios(cicloSel)} style={{background:CRIT[cicloSel].color,color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontWeight:700,cursor:"pointer",fontSize:13,whiteSpace:"nowrap"}}>
              🖨️ Imprimir criterios
            </button>
          </div>
          <div style={{marginBottom:10,background:CRIT[cicloSel].color+"15",borderRadius:12,padding:"10px 14px",border:`1px solid ${CRIT[cicloSel].color}30`}}>
            <span style={{fontSize:12,color:CRIT[cicloSel].color,fontWeight:700}}>
              {CRIT[cicloSel].data.reduce((a,b)=>a+b.items.length,0)} criterios de evaluación · {CRIT[cicloSel].label} · Decreto 101/2023 / Decreto 102/2023 · Junta de Andalucía
            </span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {CRIT[cicloSel].data.map(blk=><div key={blk.ce} style={{...card({padding:"1.2rem",borderLeft:`3px solid ${CRIT[cicloSel].color}`})}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <span style={{background:CRIT[cicloSel].color+"20",color:CRIT[cicloSel].color,borderRadius:8,padding:"3px 9px",fontSize:12,fontWeight:700}}>{blk.ce}</span>
                <span style={{fontWeight:700,color:CRIT[cicloSel].color,fontSize:14}}>{blk.tit}</span>
              </div>
              {blk.items.map(it=><div key={it.cod} style={{background:S.s2,borderRadius:10,padding:"8px 12px",display:"flex",gap:10,marginBottom:6}}>
                <span style={{fontSize:11,fontWeight:800,color:CRIT[cicloSel].color,whiteSpace:"nowrap",marginTop:2}}>{it.cod}</span>
                <p style={{margin:0,fontSize:12,color:S.tx2,lineHeight:1.65}}>{it.txt}</p>
              </div>)}
            </div>)}
          </div>
        </div>}

        {/* ── SA ── */}
        {view==="sa"&&<div style={{display:"grid",gridTemplateColumns:"260px 1fr",gap:18,alignItems:"start"}}>
          <div style={{...card({padding:"1.1rem",position:"sticky",top:58})}}>
            <div style={{fontWeight:800,fontSize:13,color:"#ec4899",marginBottom:12}}>📚 Situación de Aprendizaje</div>
            <div style={{marginBottom:10}}><label style={lbl}>Título (opcional)</label><input style={inp} value={saForm.titulo} onChange={e=>setSaForm(p=>({...p,titulo:e.target.value}))} placeholder="Ej: Somos Campeones"/></div>
            <div style={{marginBottom:10}}><label style={lbl}>Ciclo</label><select style={inp} value={saForm.ciclo} onChange={e=>setSaForm(p=>({...p,ciclo:e.target.value}))}>{Object.entries(CRIT).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>
            <div style={{marginBottom:10}}><label style={lbl}>Saber Básico</label><select style={inp} value={saForm.bloque} onChange={e=>setSaForm(p=>({...p,bloque:+e.target.value}))}>{BLQ.map((b,i)=><option key={i} value={i}>{b}</option>)}</select></div>
            <div style={{marginBottom:10}}><label style={lbl}>Número de sesiones</label><select style={inp} value={saForm.numSes} onChange={e=>setSaForm(p=>({...p,numSes:+e.target.value}))}>{[4,5,6,7,8,10,12].map(n=><option key={n} value={n}>{n} sesiones</option>)}</select></div>
            <div style={{marginBottom:10}}><label style={lbl}>Instrumentos de Evaluación</label><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{INST_L.map(i=><button key={i} onClick={()=>setSaForm(p=>({...p,instrEval:(p.instrEval||[]).includes(i)?(p.instrEval||[]).filter(x=>x!==i):[...(p.instrEval||[]),i]}))} style={pill((saForm.instrEval||[]).includes(i),"#ec4899")}>{i}</button>)}</div></div>
            <div style={{marginBottom:10}}><label style={lbl}>Producto Final</label><select style={inp} value={saForm.productoFinal||""} onChange={e=>setSaForm(p=>({...p,productoFinal:e.target.value}))}><option value="">Seleccionar...</option>{PROD_L.map(p=><option key={p}>{p}</option>)}</select></div>
            <div style={{marginBottom:10}}><label style={lbl}>Comp. Clave</label><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{CCLS.map(c=><button key={c} onClick={()=>setSaForm(p=>({...p,compClave:(p.compClave||[]).includes(c)?(p.compClave||[]).filter(x=>x!==c):[...(p.compClave||[]),c]}))} style={pill((saForm.compClave||[]).includes(c),S.a1)}>{c}</button>)}</div></div>
            <div style={{marginBottom:14}}><label style={lbl}>ODS</label><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{ODS_L.map(o=><button key={o} onClick={()=>setSaForm(p=>({...p,ods:(p.ods||[]).includes(o)?(p.ods||[]).filter(x=>x!==o):[...(p.ods||[]),o]}))} style={pill((saForm.ods||[]).includes(o),"#f59e0b")}>{o.substring(0,16)}</button>)}</div></div>
            <button onClick={genSA} disabled={saLoad} style={{width:"100%",background:saLoad?"#94a3b8":"linear-gradient(135deg,#ec4899,#8b5cf6)",color:"#fff",border:"none",borderRadius:12,padding:12,fontWeight:700,fontSize:14,cursor:saLoad?"default":"pointer"}}>
              {saLoad?"⏳ Generando SA...":"✨ Generar SA"}
            </button>
            {saRes&&<div style={{marginTop:10,display:"flex",gap:6}}>
              <button onClick={()=>printSA(saRes,saForm)} style={{flex:1,background:"#ec4899",color:"#fff",border:"none",borderRadius:10,padding:"9px",fontWeight:700,cursor:"pointer",fontSize:12}}>🖨️ Imprimir SA</button>
            </div>}
          </div>
          <div>
            {!saRes?<div>
              <div style={{...card({padding:"1.25rem",marginBottom:14,borderColor:"rgba(236,72,153,0.3)"})}}>
                <div style={{fontWeight:700,fontSize:13,color:"#ec4899",marginBottom:10}}>📦 Banco de SA prediseñadas</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:8}}>
                  {SA_BANCO.map(sa=><div key={sa.id} style={{background:"#fdf2f8",borderRadius:12,padding:"10px 14px",border:"1px solid #fbcfe8"}}>
                    <div style={{fontWeight:700,fontSize:12,color:"#ec4899",marginBottom:3}}>{sa.titulo}</div>
                    <div style={{fontSize:10,color:S.tx3,marginBottom:6}}>{CRIT[sa.ciclo]?.label} · {BLQ[sa.bloque]?.substring(0,20)} · {sa.numSes} ses.</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:8}}>{sa.instrEval.map(i=><span key={i} style={{fontSize:9,background:"#fff",borderRadius:6,padding:"1px 5px",color:"#ec4899",border:"1px solid #fbcfe8"}}>{i}</span>)}</div>
                    <button onClick={()=>{setSaForm({titulo:sa.titulo,ciclo:sa.ciclo,bloque:sa.bloque,numSes:sa.numSes,instrEval:sa.instrEval,productoFinal:sa.productoFinal,compClave:sa.compClave,ods:sa.ods});}} style={{width:"100%",background:"#ec4899",color:"#fff",border:"none",borderRadius:8,padding:"6px",fontWeight:700,cursor:"pointer",fontSize:11}}>Cargar →</button>
                  </div>)}
                </div>
              </div>
              <div style={{...card({padding:"2rem",textAlign:"center"})}}>
                <div style={{fontSize:48,marginBottom:12}}>📚</div>
                <h3 style={{color:S.tx3,fontWeight:500,margin:0}}>O configura tu propia SA</h3>
                <p style={{color:S.tx3,fontSize:12,marginTop:8}}>Se guarda automáticamente en Firebase. Incluye tarea final, sesiones, criterios LOMLOE, rúbrica e interdisciplinariedad.</p>
              </div>
            </div>:
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{...card({padding:"1.4rem",borderColor:"rgba(236,72,153,0.3)"})}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:8}}>
                  <h2 style={{margin:0,color:"#ec4899"}}>{saRes.titulo}</h2>
                  <span style={{background:"#fdf2f8",color:"#ec4899",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>{CRIT[saForm.ciclo]?.label} · {BLQ[saForm.bloque]}</span>
                </div>
                <p style={{margin:"0 0 10px",color:S.tx2,fontSize:13,lineHeight:1.6}}>{saRes.justificacion}</p>
                <div style={{background:"#fdf2f8",borderRadius:10,padding:"8px 12px",border:"1px solid #fbcfe8"}}><span style={{color:"#ec4899",fontWeight:700,fontSize:12}}>🎯 Tarea Final: </span><span style={{color:S.tx,fontSize:12}}>{saRes.tareaFinal}</span></div>
              </div>
              <div style={{...card({padding:"1rem"})}}>
                <div style={{fontSize:11,color:S.tx2,fontWeight:700,marginBottom:8,textTransform:"uppercase"}}>📦 Producto Final</div>
                <p style={{margin:0,fontSize:13,color:S.tx2}}>{saRes.productoFinal}</p>
              </div>
              <div style={{...card({padding:"1rem"})}}>
                <div style={{fontSize:11,color:S.tx2,fontWeight:700,marginBottom:10,textTransform:"uppercase"}}>📅 Secuencia de Sesiones — {saRes.sesiones?.length} sesiones</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {saRes.sesiones?.map(ses=><div key={ses.n} style={{padding:"10px 12px",background:ses.n===1||ses.n===saRes.sesiones.length?"#fdf2f8":S.s2,borderRadius:10,border:`1px solid ${ses.n===1||ses.n===saRes.sesiones.length?"#fbcfe8":"#e2e8f0"}`}}>
                    <span style={{fontSize:10,fontWeight:700,color:"#ec4899"}}>Sesión {ses.n}</span>
                    <div style={{fontWeight:700,fontSize:12,margin:"3px 0",color:S.tx}}>{ses.titulo}</div>
                    <p style={{margin:"0 0 3px",fontSize:11,color:S.tx2,lineHeight:1.5}}>{ses.objetivo}</p>
                    <p style={{margin:0,fontSize:10,color:S.tx3,lineHeight:1.4}}>{ses.desc?.substring(0,80)}…</p>
                  </div>)}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[{l:"📊 Criterios LOMLOE",v:saRes.criteriosLomloe,c:S.a1},{l:"📋 Evaluación",v:saRes.evaluacion,c:"#3b82f6"},{l:"⚖️ Ponderación",v:saRes.ponderacion,c:"#f59e0b"},{l:"🔗 Interdisciplinariedad",v:saRes.interdisciplinariedad,c:"#6366f1"},{l:"🎯 Producto",v:saRes.productoFinal,c:"#10b981"}].map((it,i)=><div key={i} style={{...card({padding:"1rem",borderTop:`2px solid ${it.c}30`})}}>
                  <div style={{fontSize:11,color:it.c,fontWeight:700,marginBottom:5}}>{it.l}</div>
                  <p style={{margin:0,fontSize:12,color:S.tx2,lineHeight:1.6}}>{it.v}</p>
                </div>)}
              </div>
              <div style={card({padding:"1.1rem"})}>
                <div style={{fontSize:11,color:S.tx3,fontWeight:700,marginBottom:6}}>📐 RÚBRICA DE EVALUACIÓN</div>
                <p style={{margin:0,fontSize:13,color:S.tx2,lineHeight:1.7}}>{saRes.rubrica}</p>
              </div>
              {saRes.instrumentos?.length>0&&<div style={card({padding:"1.1rem"})}>
                <div style={{fontSize:11,color:S.tx3,fontWeight:700,marginBottom:8}}>🛠️ INSTRUMENTOS DE EVALUACIÓN SELECCIONADOS</div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {saRes.instrumentos.map((ins,i)=><div key={i} style={{display:"flex",gap:10,padding:"7px 10px",background:S.s2,borderRadius:10,border:"1px solid #e2e8f0"}}>
                    <span style={{fontSize:12,fontWeight:700,color:S.a1,whiteSpace:"nowrap"}}>{ins.nombre}</span>
                    <span style={{fontSize:12,color:S.tx2}}>{ins.desc}</span>
                  </div>)}
                </div>
              </div>}
            </div>}
          </div>
        </div>}

        {view==="sesiones"&&<MisSesionesView uid={uid} onLoad={cargarSesion}/>}
        {view==="horario"&&<HorarioView cfg={cfg} uid={uid}/>}
        {view==="cal"&&<CalendarioView uid={uid}/>}
        {view==="admin"&&<AdminView cfg={cfg} onSave={saveCfg} user={user}/>}
        {view==="timer"&&<TimerView/>}
        {view==="stats"&&<StatsView uid={uid} onNav={setView}/>}
        {view==="prog"&&<ProgramacionView uid={uid} cfg={cfg}/>}
        {view==="seg"&&<SeguimientoView uid={uid} cfg={cfg}/>}
        {view==="tests"&&<TestsView uid={uid}/>}
        {view==="informes"&&<InformesView uid={uid} cfg={cfg}/>}
        {view==="recursos"&&<RecursosView uid={uid}/>}
        {view==="calif"&&<CalificacionesView uid={uid} cfg={cfg}/>}
        {view==="diario"&&<DiarioView uid={uid} cfg={cfg}/>}
        </div>
        {/* Footer */}
        <div style={{padding:"1rem 1.5rem",borderTop:"1px solid rgba(0,0,0,0.06)",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <span style={{fontFamily:"'Outfit',system-ui",fontWeight:700,color:"#4f46e5",fontSize:11}}>EduFísica Pro</span>
          <span style={{color:S.tx4,fontSize:11}}>·</span>
          <span style={{fontSize:11,color:S.tx4}}>LOMLOE · Decreto 101/2023 / 102/2023 · Junta de Andalucía · {cfg.localidad}</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
